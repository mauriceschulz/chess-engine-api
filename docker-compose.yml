services:
  chess-engine-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: chess-engine-api:latest
    container_name: chess-engine-api
    restart: unless-stopped
    ports:
      - "${CHESS_ENGINE_API_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-prod}"
    networks:
      - default
      - portfolio-network

networks:
  portfolio-network:
    external: true
    name: portfolio_portfolio-network
